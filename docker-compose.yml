# =============================================================================
# Gateway apenas — cada microserviço (Identity, Ingestion, …) corre noutro
# contentor/imagem; este compose NÃO os inclui.
#
# Rede partilhada (opcional): crie uma rede e use-a em todos os stacks para DNS
# entre contentores, ex.:
#   docker network create simcag_net
#   Em cada compose: networks → default → external: true, name: simcag_net
# =============================================================================

services:
  gateway-service:
    build:
      context: .
      dockerfile: Simcag.Gateway.Api/Dockerfile
    image: simcag/gateway-service:latest
    container_name: simcag-gateway-service
    ports:
      # host:contentor — dentro do contentor a API escuta na porta ASPNETCORE_HTTP_PORTS (8080)
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_URLS: http://+:8080
      DOTNET_RUNNING_IN_CONTAINER: "true"
      JWT__ISSUER: Simcag.IdentityService
      JWT__AUDIENCE: Simcag.Clients
      JWT__SECRET: ${JWT_SECRET:-Simcag.Dev.Jwt.NotForProduction.AlignWithIdentityService.01!}
      # Não uses SERVICES__*__URL=http://localhost:… aqui: no contentor localhost és o próprio gateway.
      # Com rede partilhada e serviços com nomes identity-service, … omita SERVICES__* (defaults no código).
      # APIs só no host: SIMCAG_SERVICES_HOST / SIMCAG_FALLBACK_HOST — ver Simcag.Gateway.Api/.env.example
    networks:
      - simcag_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "p=\"$${ASPNETCORE_HTTP_PORTS:-8080}\"; p=\"$${p%%,*}\"; curl -fsS \"http://127.0.0.1:$${p}/health/live\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 25s

networks:
  simcag_net:
    driver: bridge
