version: '3.8'

services:
  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simcag-gateway-service
    ports:
      - "8080:8080"
    environment:
      - IDENTITY_SERVICE_URL=http://identity-service:5000
      - REDIS_CONNECTION=redis:6379
      - RATE_LIMIT_REQUESTS=100
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    depends_on:
      - redis
      - identity-service
    networks:
      - simcag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "p=\"$${ASPNETCORE_HTTP_PORTS:-8080}\"; p=\"$${p%%,*}\"; curl -f \"http://localhost:$${p}/health\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  identity-service:
    image: simcag/identity-service:latest
    container_name: simcag-identity-service
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=Simcag;Username=postgres;Password=postgres
    depends_on:
      - db
    networks:
      - simcag-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: simcag-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - simcag-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: simcag-postgres
    environment:
      - POSTGRES_DB=Simcag
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - simcag-network
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:

networks:
  simcag-network:
    driver: bridge
