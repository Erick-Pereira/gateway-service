# Secrets: DOCKER_USERNAME, DOCKER_PASSWORD

name: gateway-service

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Run tests
        run: dotnet test Simcag.Gateway.Tests/Simcag.Gateway.Tests.csproj -c Release

  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Pré-pull imagens base .NET (MCR / GHA)
        shell: bash
        run: |
          set -euo pipefail
          SDK_IMG="mcr.microsoft.com/dotnet/sdk:10.0-noble"
          RUN_IMG="mcr.microsoft.com/dotnet/aspnet:10.0-noble"
          for attempt in 1 2 3 4 5; do
            if docker pull "$SDK_IMG" && docker pull "$RUN_IMG"; then
              exit 0
            fi
            echo "MCR pull failed (attempt $attempt); retrying..."
            sleep "$((attempt * 8))"
          done
          exit 1
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: shelow/gateway-service:latest
          context: .
          file: Simcag.Gateway.Api/Dockerfile
